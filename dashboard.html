<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}

h1{
margin-bottom:20px;
}

.stats{
display:flex;
gap:20px;
margin-bottom:30px;
}

.stats div{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#ff7f00;
color:white;
}

</style>

</head>

<body>

<h1>Admin Dashboard</h1>

<div class="stats">

<div id="totalBookings">Total Bookings: 0</div>
<div id="todayRevenue">Revenue Today: ₹0</div>

</div>

<table>

<thead>

<tr>

<th>Name</th>
<th>Bike</th>
<th>Date</th>
<th>Hours</th>
<th>Total</th>

</tr>

</thead>

<tbody id="bookingTable"></tbody>

</table>

<script src="dashboard.js"></script>

</body>
</html>
