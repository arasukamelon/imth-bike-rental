<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Segoe UI;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
width:320px;
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

.login-box button{
width:100%;
padding:12px;
background:#ff7f00;
border:none;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.login-box button:hover{
background:#e66f00;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script src="script.js"></script>

</body>
</html>
